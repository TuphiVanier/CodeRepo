<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="fernanda" src="./phone.glb"></a-asset-item>
        <a-asset-item id="luke" src="./boba.glb"></a-asset-item>
        <a-asset-item id="zoe" src="./waterbottle.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: ${customFields.libVersion}; objects: .clickable"></a-camera>

      <a-entity id="mytarget" mytarget mindar-image-target="targetIndex: 0">
        <a-gltf-model id="fernanda-model" class="clickable" rotation="0 -90 0 " position="0 -.5 0" scale="1 1 1" src="#fernanda">
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model rotation="0 0 0 " position="0 -.7 0" scale=".5 .5 .5" src="#luke" animation="property: position; to: 0 -.8 0; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model rotation="0 0 0 " position="0 -.7 0" scale=".5 .5 .5" src="#zoe" animation="property: position; to: 0 -.8 0; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
      </a-entity>

    </a-scene>

    <script>
    const text = document.querySelector("#information");
    const fernada = document.querySelector("#fernanda-model");
    fernada.addEventListener("click", () =>{
    fernada.setAttribute("animation__fernanda_move", "loop: false; property: position; to: .5 1 .5")

    console.log("clicked")
    })
    </script>
  </body>
</html>
